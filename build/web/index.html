<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Học bảng chữ cái tiếng Nhật</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <h1>Học bảng chữ cái tiếng Nhật</h1>

            <!-- Chọn bảng -->
            <div class="type-buttons">
                <button id="hiraganaBtn">Hiragana</button>
                <button id="katakanaBtn">Katakana</button>
            </div>

            <!-- Danh sách kana -->
            <div id="kanaContainer" class="container mt-4"></div>

            <!-- Chọn tất cả -->
            <div class="control-buttons">
                <button id="selectAllBtn">Chọn hết</button>
                <button id="clearAllBtn">Xóa hết</button>
            </div>
            <!-- Nút bắt đầu -->
            <button id="startBtn">Học thuộc</button>

            <!-- Trang học -->
            <div id="studyPage" style="display:none;">

                <h2 id="progress"></h2>

                <div id="kanaDisplay"></div>

                <input type="text"
                       id="answerInput"
                       placeholder="Nhập romaji...">

                <br><br>

                <button id="checkBtn">Kiểm tra</button>

                <h3 id="result"></h3>

                <button id="nextBtn" style="display:none;">
                    Tiếp theo
                </button>

            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
